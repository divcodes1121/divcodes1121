name: Generate Anime Counter

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate SVG Counter
        run: |
          mkdir -p dist
          COUNT=$(date +%s | cut -c6-10)

          cat <<EOF > dist/anime-counter.svg
          <svg width="400" height="120" xmlns="http://www.w3.org/2000/svg">
            <style>
              .title { fill: #8A2BE2; font-size: 18px; font-family: Arial; }
              .count { fill: #FFFFFF; font-size: 36px; font-weight: bold; }
            </style>

            <!-- Background -->
            <rect width="100%" height="100%" fill="#0D1117" rx="15"/>

            <!-- Fake Anime Circle -->
            <circle cx="60" cy="60" r="40" fill="#8A2BE2">
              <animate attributeName="r" values="40;45;40" dur="2s" repeatCount="indefinite"/>
            </circle>

            <!-- Eyes -->
            <circle cx="50" cy="55" r="5" fill="white"/>
            <circle cx="70" cy="55" r="5" fill="white"/>

            <!-- Counter Text -->
            <text x="140" y="50" class="title">Cursed Energy Observers</text>
            <text x="140" y="90" class="count">${COUNT}</text>
          </svg>
          EOF

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          keep_files: true
