name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "10 0 * * *"   # runs 10 min after snake (avoids conflict)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ✅ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # ✅ Generate Pacman
      - name: Generate Pacman Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: divcodes1121

      # 🔍 Optional debug (safe to keep/remove)
      - name: Check generated files
        run: |
          echo "Listing root:"
          ls -la
          echo "Listing dist:"
          ls -la dist || echo "dist missing"

      # ✅ Deploy WITHOUT deleting snake files
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          keep_files: true
